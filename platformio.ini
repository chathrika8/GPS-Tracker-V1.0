; GPS Tracker — PlatformIO Configuration
; ESP32-C3 + SIM800L + NEO-6M + SH1107 OLED

[env:esp32c3]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; Libraries
lib_deps =
    mikalhart/TinyGPSPlus@^1.1
    adafruit/Adafruit SH110X@^2.1
    adafruit/Adafruit GFX Library@^1.11
    vshymanskyy/TinyGSM@^0.11
    bblanchon/ArduinoJson@^7.0
    Wire

; Custom OTA partition table — dual app slots
board_build.partitions = partitions.csv
board_build.filesystem = littlefs

; Build flags
build_flags =
    -DTINY_GSM_MODEM_SIM800
    -DCORE_DEBUG_LEVEL=3
    -DARDUINOJSON_ENABLE_PROGMEM=1
